<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAVIA — Explora el Ecosistema</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --verde: #14DC80;
    --morado: #3B2677;
    --fondo: #070714;
    --morado-claro: #5a3fa0;
    --blanco: #F0FFF8;
  }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--fondo);
    color: var(--blanco);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ========== PANTALLAS ========== */
  .screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    padding: 20px;
  }
  .screen.active { display: flex; }

  /* ========== PANTALLA INICIO ========== */
  #screen-intro {
    background: radial-gradient(ellipse at center, #1a0a3a 0%, #070714 70%);
  }

  .logo-savia {
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 900;
    letter-spacing: 0.3em;
    background: linear-gradient(135deg, var(--verde), var(--morado-claro));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    animation: pulse-logo 3s ease-in-out infinite;
    margin-bottom: 10px;
  }

  @keyframes pulse-logo {
    0%, 100% { filter: drop-shadow(0 0 20px #14DC8088); }
    50% { filter: drop-shadow(0 0 40px #14DC80cc); }
  }

  .tagline {
    font-size: clamp(0.9rem, 2.5vw, 1.3rem);
    color: var(--verde);
    letter-spacing: 0.15em;
    margin-bottom: 40px;
    text-align: center;
    opacity: 0.85;
  }

  .tree-icon {
    font-size: 100px;
    margin: 20px 0;
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(0 0 30px #14DC80);
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  .intro-text {
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    color: rgba(240,255,248,0.75);
    text-align: center;
    max-width: 500px;
    line-height: 1.7;
    margin-bottom: 40px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--verde), #0fa860);
    color: #070714;
    border: none;
    padding: 16px 50px;
    font-size: 1.1rem;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.3s;
    box-shadow: 0 0 30px #14DC8066;
  }
  .btn-primary:hover {
    transform: scale(1.07);
    box-shadow: 0 0 50px #14DC80aa;
  }

  /* ========== MAPA DEL ÁRBOL ========== */
  #screen-map {
    background: radial-gradient(ellipse at center bottom, #1a0a3a 0%, #070714 60%);
    justify-content: flex-start;
    overflow-y: auto;
    padding-top: 0;
  }

  .map-header {
    width: 100%;
    text-align: center;
    padding: 20px;
    background: rgba(7,7,20,0.8);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 20;
    border-bottom: 1px solid rgba(20,220,128,0.2);
  }

  .map-header h2 {
    color: var(--verde);
    font-size: 1.3rem;
    letter-spacing: 0.2em;
  }

  .seeds-bar {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .seed-badge {
    font-size: 1.4rem;
    opacity: 0.25;
    transition: all 0.5s;
    filter: grayscale(1);
  }
  .seed-badge.unlocked {
    opacity: 1;
    filter: none;
    animation: pop 0.4s ease;
  }

  @keyframes pop {
    0% { transform: scale(0); }
    70% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .tree-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 700px;
    padding: 30px 20px 60px;
    gap: 15px;
  }

  .zone-card {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(20,220,128,0.15);
    border-radius: 20px;
    padding: 20px 25px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .zone-card::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(20,220,128,0.08), transparent);
    transition: left 0.5s;
  }
  .zone-card:hover::before { left: 100%; }

  .zone-card:hover {
    border-color: var(--verde);
    background: rgba(20,220,128,0.08);
    transform: translateY(-3px);
    box-shadow: 0 10px 40px rgba(20,220,128,0.2);
  }

  .zone-card.locked {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .zone-card.locked:hover { transform: none; box-shadow: none; }

  .zone-card.completed {
    border-color: var(--verde);
    background: rgba(20,220,128,0.06);
  }

  .zone-header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 8px;
  }

  .zone-emoji { font-size: 2.2rem; }

  .zone-name {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--blanco);
  }

  .zone-sub {
    font-size: 0.8rem;
    color: var(--verde);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .zone-desc {
    font-size: 0.9rem;
    color: rgba(240,255,248,0.6);
    line-height: 1.5;
    margin-top: 5px;
  }

  .zone-status {
    position: absolute;
    top: 15px; right: 20px;
    font-size: 1.3rem;
  }

  .savia-connector {
    width: 3px;
    height: 30px;
    background: linear-gradient(to bottom, var(--verde), var(--morado-claro));
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }

  .savia-connector::after {
    content: '';
    position: absolute;
    top: -100%;
    width: 100%; height: 50%;
    background: rgba(255,255,255,0.8);
    animation: flow-down 2s linear infinite;
  }

  @keyframes flow-down {
    0% { top: -50%; }
    100% { top: 150%; }
  }

  /* ========== ZONA / MINIJUEGO ========== */
  #screen-zone {
    background: radial-gradient(ellipse at center, #1a0a3a 0%, #070714 70%);
    padding: 20px;
  }

  .zone-game-container {
    width: 100%;
    max-width: 650px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .zone-title-bar {
    display: flex;
    align-items: center;
    gap: 15px;
    width: 100%;
  }

  .btn-back {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--blanco);
    padding: 8px 16px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.3s;
  }
  .btn-back:hover { background: rgba(20,220,128,0.15); border-color: var(--verde); }

  .zone-big-title {
    font-size: clamp(1.3rem, 4vw, 2rem);
    font-weight: 800;
    color: var(--verde);
    text-align: center;
    flex: 1;
  }

  .zone-narrative {
    background: rgba(59,38,119,0.3);
    border: 1px solid rgba(59,38,119,0.5);
    border-radius: 16px;
    padding: 20px 25px;
    font-size: 0.95rem;
    line-height: 1.7;
    color: rgba(240,255,248,0.85);
    width: 100%;
    text-align: center;
  }

  .guide-bubble {
    display: flex;
    align-items: flex-start;
    gap: 15px;
    background: rgba(20,220,128,0.08);
    border: 1px solid rgba(20,220,128,0.25);
    border-radius: 16px;
    padding: 16px 20px;
    width: 100%;
  }

  .guide-avatar {
    font-size: 2.5rem;
    flex-shrink: 0;
  }

  .guide-text {
    font-size: 0.9rem;
    color: var(--verde);
    line-height: 1.6;
    font-style: italic;
  }

  /* ========== MINIJUEGOS ========== */
  .minigame-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(20,220,128,0.2);
    border-radius: 20px;
    padding: 25px;
    width: 100%;
  }

  .minigame-title {
    text-align: center;
    font-size: 1rem;
    font-weight: 700;
    color: var(--verde);
    margin-bottom: 20px;
    letter-spacing: 0.1em;
  }

  /* Minijuego: Conectar */
  .connect-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .connect-item {
    background: rgba(59,38,119,0.4);
    border: 2px solid rgba(59,38,119,0.6);
    border-radius: 12px;
    padding: 12px 15px;
    cursor: pointer;
    font-size: 0.85rem;
    text-align: center;
    transition: all 0.3s;
    color: var(--blanco);
  }
  .connect-item:hover { border-color: var(--verde); background: rgba(20,220,128,0.1); }
  .connect-item.selected { border-color: var(--verde); background: rgba(20,220,128,0.2); color: var(--verde); }
  .connect-item.matched { border-color: #14DC80; background: rgba(20,220,128,0.3); color: var(--verde); pointer-events: none; animation: matched-pop 0.4s ease; }
  .connect-item.wrong { border-color: #ff4466; animation: shake 0.3s ease; }

  @keyframes matched-pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* Minijuego: Secuencia */
  .sequence-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .seq-item {
    background: rgba(59,38,119,0.4);
    border: 2px solid rgba(59,38,119,0.6);
    border-radius: 14px;
    padding: 14px 8px;
    cursor: pointer;
    text-align: center;
    font-size: 0.8rem;
    transition: all 0.3s;
    color: var(--blanco);
  }
  .seq-item .seq-icon { font-size: 1.8rem; display: block; margin-bottom: 6px; }
  .seq-item:hover { border-color: var(--verde); }
  .seq-item.active-seq { border-color: var(--verde); background: rgba(20,220,128,0.2); }
  .seq-item.correct-seq { border-color: #14DC80; background: rgba(20,220,128,0.3); pointer-events: none; }
  .seq-item.wrong-seq { border-color: #ff4466; }

  /* Minijuego: Match */
  .match-scenario {
    background: rgba(59,38,119,0.3);
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 15px;
    text-align: center;
    font-size: 0.9rem;
    line-height: 1.5;
    color: rgba(240,255,248,0.9);
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .match-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .match-opt {
    background: rgba(59,38,119,0.4);
    border: 2px solid rgba(59,38,119,0.6);
    border-radius: 12px;
    padding: 12px 18px;
    cursor: pointer;
    font-size: 0.88rem;
    transition: all 0.3s;
    color: var(--blanco);
    text-align: left;
  }
  .match-opt:hover { border-color: var(--verde); background: rgba(20,220,128,0.1); }
  .match-opt.correct { border-color: var(--verde); background: rgba(20,220,128,0.25); pointer-events: none; }
  .match-opt.incorrect { border-color: #ff4466; background: rgba(255,68,102,0.1); pointer-events: none; }

  /* Minijuego: Catch */
  .catch-area {
    position: relative;
    width: 100%;
    height: 250px;
    background: rgba(0,0,0,0.3);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(20,220,128,0.2);
    cursor: pointer;
  }

  .data-drop {
    position: absolute;
    font-size: 1.5rem;
    animation: fall linear forwards;
    cursor: pointer;
    z-index: 5;
  }

  @keyframes fall {
    0% { top: -40px; }
    100% { top: 110%; }
  }

  .catch-basket {
    position: absolute;
    bottom: 10px;
    font-size: 2rem;
    transition: left 0.1s;
    z-index: 10;
    pointer-events: none;
  }

  .catch-score {
    text-align: center;
    font-size: 1.1rem;
    color: var(--verde);
    margin-bottom: 10px;
    font-weight: 700;
  }

  /* Minijuego: Garden */
  .garden-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 15px;
  }

  .plant-slot {
    background: rgba(59,38,119,0.3);
    border: 2px dashed rgba(59,38,119,0.6);
    border-radius: 14px;
    padding: 15px 8px;
    text-align: center;
    font-size: 0.78rem;
    color: rgba(240,255,248,0.6);
    min-height: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.3s;
  }

  .plant-slot .plant-icon { font-size: 2rem; }
  .plant-slot.growing { border-style: solid; border-color: var(--verde); background: rgba(20,220,128,0.1); }
  .plant-slot.bloomed { border-color: #FFD700; background: rgba(255,215,0,0.1); animation: bloom 0.5s ease; }

  @keyframes bloom {
    0% { transform: scale(0.8); }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  .resources-bar {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .resource-btn {
    background: rgba(59,38,119,0.5);
    border: 1px solid rgba(59,38,119,0.8);
    color: var(--blanco);
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .resource-btn:hover { border-color: var(--verde); background: rgba(20,220,128,0.1); }
  .resource-btn.used { opacity: 0.4; pointer-events: none; }

  /* Minijuego: Decisión */
  .decision-story {
    background: rgba(59,38,119,0.3);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 15px;
    font-size: 0.92rem;
    line-height: 1.6;
    color: rgba(240,255,248,0.9);
    text-align: center;
  }

  .decision-options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .decision-opt {
    background: rgba(59,38,119,0.4);
    border: 2px solid rgba(59,38,119,0.6);
    border-radius: 14px;
    padding: 16px 20px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.3s;
    color: var(--blanco);
    text-align: center;
  }
  .decision-opt:hover { border-color: var(--verde); transform: translateY(-2px); }
  .decision-opt.data-choice { border-color: var(--verde); }
  .decision-opt.intuition-choice { border-color: #ff8844; }

  .decision-result {
    display: none;
    background: rgba(20,220,128,0.1);
    border: 1px solid var(--verde);
    border-radius: 14px;
    padding: 18px;
    text-align: center;
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--verde);
  }

  /* ========== FEEDBACK BAR ========== */
  .feedback-bar {
    width: 100%;
    padding: 12px 20px;
    border-radius: 12px;
    text-align: center;
    font-size: 0.9rem;
    font-weight: 600;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .feedback-bar.success { background: rgba(20,220,128,0.2); border: 1px solid var(--verde); color: var(--verde); display: block; }
  .feedback-bar.info { background: rgba(59,38,119,0.3); border: 1px solid rgba(59,38,119,0.6); color: rgba(240,255,248,0.8); display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .btn-complete {
    background: linear-gradient(135deg, var(--verde), #0fa860);
    color: #070714;
    border: none;
    padding: 14px 40px;
    font-size: 1rem;
    font-weight: 800;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.3s;
    box-shadow: 0 0 25px rgba(20,220,128,0.4);
    display: none;
  }
  .btn-complete:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(20,220,128,0.6); }
  .btn-complete.show { display: block; }

  /* ========== PANTALLA FINAL ========== */
  #screen-final {
    background: radial-gradient(ellipse at center, #1a0a3a 0%, #070714 70%);
  }

  .final-tree {
    font-size: 120px;
    animation: glow-tree 2s ease-in-out infinite;
    margin-bottom: 10px;
  }

  @keyframes glow-tree {
    0%, 100% { filter: drop-shadow(0 0 30px #14DC80) drop-shadow(0 0 60px #14DC8066); }
    50% { filter: drop-shadow(0 0 50px #14DC80) drop-shadow(0 0 100px #14DC8088); }
  }

  .final-seeds {
    display: flex;
    gap: 15px;
    font-size: 2rem;
    margin: 20px 0;
    animation: seeds-appear 1s ease 0.3s both;
  }

  @keyframes seeds-appear {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }

  .final-title {
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--verde), var(--morado-claro));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    margin-bottom: 15px;
  }

  .final-msg {
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    color: rgba(240,255,248,0.75);
    text-align: center;
    max-width: 480px;
    line-height: 1.7;
    margin-bottom: 35px;
  }

  .cert-box {
    background: rgba(59,38,119,0.3);
    border: 2px solid var(--verde);
    border-radius: 20px;
    padding: 20px 35px;
    text-align: center;
    margin-bottom: 30px;
    max-width: 400px;
  }

  .cert-box .cert-title {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--verde);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .cert-box .cert-name {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--blanco);
    margin-bottom: 5px;
  }

  .cert-box .cert-sub {
    font-size: 0.8rem;
    color: rgba(240,255,248,0.6);
  }

  .final-btns {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-restart {
    background: transparent;
    border: 2px solid var(--verde);
    color: var(--verde);
    padding: 12px 30px;
    font-size: 0.95rem;
    font-weight: 600;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-restart:hover { background: rgba(20,220,128,0.1); }

  /* Progress dots */
  .progress-dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 5px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.4s;
  }
  .dot.filled { background: var(--verde); box-shadow: 0 0 8px var(--verde); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
  ::-webkit-scrollbar-thumb { background: var(--morado-claro); border-radius: 2px; }

  @media (max-width: 480px) {
    .connect-grid, .sequence-grid, .garden-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<!-- PANTALLA 1: INTRO -->
<div id="screen-intro" class="screen active">
  <div class="logo-savia">SAVIA</div>
  <div class="tagline">La inteligencia que fluye contigo</div>
  <div class="tree-icon">🌳</div>
  <p class="intro-text">
    Bienvenido al ecosistema de Analítica Avanzada e Inteligencia Artificial de Ecopetrol. 
    Un espacio vivo donde todo está conectado, el conocimiento circula y las decisiones crecen desde la raíz.
  </p>
  <button class="btn-primary" onclick="goToMap()">✨ Explorar el Ecosistema</button>
</div>

<!-- PANTALLA 2: MAPA -->
<div id="screen-map" class="screen">
  <div class="map-header">
    <h2>🌳 EL ÁRBOL DE SAVIA</h2>
    <p style="font-size:0.8rem; color:rgba(240,255,248,0.5); margin-top:4px;">Explora cada zona para despertar el árbol</p>
    <div class="seeds-bar" id="seeds-bar"></div>
    <div class="progress-dots" id="progress-dots"></div>
  </div>
  <div class="tree-container" id="tree-container"></div>
</div>
